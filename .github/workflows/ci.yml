name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: Python and JS Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m py_compile main.py backend/*.py

      - name: Check frontend JavaScript
        run: node --check static/app.js

      - name: Run tests
        run: python -m pytest -q

  docker:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start containers
        run: docker compose up --build -d

      - name: Wait for application health
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/api/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs pulse-app
          exit 1

      - name: Check imported data
        run: |
          docker compose exec -T pulse-db \
            psql -U pulse -d pulse \
            -c "select count(*) as students from students;"

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop containers
        if: always()
        run: docker compose down -v
